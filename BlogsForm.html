<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

  <title>forms| Blogs</title>
</head>

<body>
  <style>
    body {
      background-color: black;
      color: white;
    }
    .Form {

      width: 50%;
      position: absolute;
      left: 320px;
      top: 60px;
      border-radius: 5px;
      box-shadow: 0 0 5px black;
      padding: 20px;
      margin: 10px;
    }

    @media screen and (max-width:720px) {
      .Form {
        width: 100%;
        margin: 10px;
        padding: 10px;
        position: absolute;
        left: 5px;
        right: 5px;
      }

      option {
        width: 20px;
      }
    }
  </style>

  <h1 class="text-center mt-2">Send Me Your Details</h1>
  <form class="Form bg-dark" action="" onsubmit="validation();">
    <br>
    <select id="selection" class="form-select" aria-label="Default select example">
      <option value="0" selected>Choose Your Field</option>
      <option value="1">College</option>
      <option value="2">Career</option>
      <option value="3">Job</option>
      <option value="3">School</option>
    </select>
    <span id="select" class="text-danger font-weight-bold"></span>
    <hr>

    <!---->
    <div class="input-group mb-3">
      <span class="input-group-text" id="basic-addon1">Name </span>
      <input type="text" class="form-control" id="user" placeholder="Enter Your Name Here" aria-label="Username"
        aria-describedby="basic-addon1" autocomplete="off">
    </div>
    <span id="username" class="text-danger font-weight-bold"></span>
    <hr>

    <!---->
    <div class="input-group mb-3">
      <span class="input-group-text" id="basic-addon1">College / School / Organization </span>
      <input type="text" class="form-control" id="instname"
        placeholder="Enter Your College / School / Organization Name Here" aria-label="Username"
        aria-describedby="basic-addon1" autocomplete="off">
    </div>
    <span id="InstName" class="text-danger font-weight-bold"></span>
    <hr>
    <!---->
    <div class="input-group mb-3">
      <span class="input-group-text" id="basic-addon1">Mobile Number</span>
      <input type="text" class="form-control" id="num" placeholder="Enter Your Number Here" aria-label="Username"
        aria-describedby="basic-addon1" autocomplete="off">
    </div>
    <span id="Num" class="text-danger font-weight-bold"></span>
    <hr>
    
   
    <div class="Description">
      <span class="input-group-text">Description </span>
      <textarea class="form-control" aria-label="With textarea" placeholder="Give Description  "
        autocomplete="off"></textarea>
    </div>
    
    <hr>
    <button id="btn" type="submit" class="btn btn-success">Send Message</button>

  </form>

  
  <script>



    function validation() {
      var Select = document.getElementById('selection').value;
      var user = document.getElementById('user').value;
      var instiname = document.getElementById('instname').value;
      var Mobileno = document.getElementById('num').value;
      

      //Selection Validation
      if (Select == 0) {
        document.getElementById('select').innerHTML = " **Please Select Your Field ";

      }
      else {
        document.getElementById('select').innerHTML = "";

      }

      //Name Validation
      if (user == "") {
        document.getElementById('username').innerHTML = " ** Please Fill the Name field";
      }

      else if ((user.length <= 2) || (user.length > 20)) {
        document.getElementById('username').innerHTML = " ** Name Length must be between 2 to 20";
      }
      else if (!isNaN(user)) {
        document.getElementById('username').innerHTML = " ** Only Alphabet characters are allowed";
      }
      else {
        document.getElementById('username').innerHTML = "";
      }


      //Institute Validation
      if (instiname == "") {
        document.getElementById('InstName').innerHTML = " ** Please Fill the College Name field";
      }


      else if ((instiname.length <= 3) || (instiname.length > 40)) {
        document.getElementById('InstName').innerHTML = " ** Name Length must be between 3 to 40";
      }

      else if (!isNaN(instiname)) {
        document.getElementById('InstName').innerHTML = " ** Only Alphabet characters are allowed";
      }

      else {
        document.getElementById('InstName').innerHTML = "";
      }


      //Number Validation
      if (Mobileno == "") {
        document.getElementById('Num').innerHTML = " ** Please Fill the Mobile No. field";
      }
      else if (isNaN(Mobileno)) {
        document.getElementById('Num').innerHTML = " ** Please must write Digit only not character";
      }
      else if (Mobileno.length != 10) {
        document.getElementById('Num').innerHTML = " ** Please Mobile number must be 10 Digit only";
      }

      else {
        document.getElementById('Num').innerHTML = "";
      }

      

    }


  </script>
  <!-- Optional JavaScript; choose one of the two! -->

  <!-- Option 1: Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
    crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
    -->
</body>

</html>
